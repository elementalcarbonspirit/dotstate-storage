[global/wm]
margin-bottom = 0
margin-top = 0

include-file = ~/.config/polybar/colorblocks/colors.ini

[bar/main]
width = 100%
height = 32
offset-x = 0
offset-y = 0
background = ${color.background}
foreground = ${color.foreground}
bottom = false
fixed-center = true

font-0 = "JetBrainsMono Nerd Font:pixelsize=10;3"
font-1 = "JetBrainsMono Nerd Font:pixelsize=13;3"

modules-left   = i3
modules-center = money
modules-right  = timer connection clipboard notepad date battery powermenu
padding-left  = 1
padding-right = 1
module-margin-left  = 1
module-margin-right = 1

separator = 
enable-ipc = true
tray-position = right
tray-padding = 4

[settings]
screenchange-reload = true
throttle-output = 5
throttle-output-for = 10

;; ── Modules ──────────────────────────────────────────────

[module/i3]
type = internal/i3
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false

label-focused   = %index%
label-focused-background = ${color.shade1}
label-focused-foreground = ${color.foreground}
label-focused-padding = 2
label-focused-underline = ${color.shade3}

label-unfocused = %index%
label-unfocused-foreground = #4C566A
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${color.shade8}
label-urgent-foreground = ${color.foreground}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 30
date = %a %d %b
time = %H:%M
label =   %date%    %time%
label-foreground = ${color.foreground}

[module/network]
type = internal/network
interface-type = wired
interface = usb0
interval = 5

label-connected =   eth
label-connected-foreground = ${color.shade5}
label-disconnected =

[module/network-wifi]
type = internal/network
interface-type = wireless
interface = usb0
interval = 5

label-connected =   %essid%
label-connected-foreground = ${color.shade4}
label-disconnected =   offline
label-disconnected-foreground = ${color.shade8}

[module/battery]
type = internal/battery
full-at = 99
label-full       =  100%
label-charging   =  %percentage%%
label-discharging =  %percentage%%
label-charging-foreground   = ${color.shade5}
label-discharging-foreground = ${color.foreground}

[module/powermenu]
type = custom/text
content = ⏻
content-foreground = ${color.shade8}
content-padding = 1
click-left = ~/.config/polybar/colorblocks/scripts/powermenu.sh


[module/wifi]
type = internal/network
interface = usb0
interval = 5
label-connected =   %essid%
label-connected-foreground = ${color.shade4}
label-disconnected =   offline
label-disconnected-foreground = ${color.shade8}

[module/clipboard]
type = custom/text
content = clips
content-foreground = ${color.shade3}
content-padding = 1
click-left = rofi -modi "clipboard:greenclip print" -show clipboard -theme ~/.config/rofi/nord.rasi

[module/notepad]
type = custom/text
content = notes
content-foreground = ${color.shade6}
content-padding = 1
click-left = xfce4-terminal --title scratchpad-note -e "nvim ~/notes.md" &

[module/connection]
type = custom/script
exec = ~/.config/polybar/colorblocks/scripts/network.sh
interval = 5
label-foreground = ${color.shade4}

[module/timer]
type = custom/script
exec = ~/timer_module.sh
interval = 1
click-left = ~/timer_module.sh click
format = <label>
label = %output%

[module/money]
type = custom/script
exec = ~/.config/timer/bin/money_module.sh
interval = 1
click-left = ~/.config/timer/bin/money_module.sh click
hook = 1
format = <label>
label = %output%
