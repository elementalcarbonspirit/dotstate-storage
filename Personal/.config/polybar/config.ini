[colors]
bg      = #2E3440
bg-alt  = #3B4252
fg      = #ECEFF4
fg-dim  = #D8DEE9
blue    = #5E81AC
cyan    = #88C0D0
red     = #BF616A
yellow  = #EBCB8B
green   = #A3BE8C

[bar/mybar]
monitor = HDMI-0
width = 100%
height = 28
radius = 0
background = ${colors.bg}
foreground = ${colors.fg}
font-0 = JetBrainsMono Nerd Font:size=10;2
border-bottom-size = 2
border-bottom-color = ${colors.blue}
padding-left = 1
padding-right = 1
module-margin = 1
modules-left = i3
modules-center = date
modules-right = networddk clipboard tray 
wm-restack = i3
override-redirect = true

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = ${colors.cyan}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding = 2
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
label =  %date%   %time%

[module/network]
type = internal/network
interface = $(ip route | grep default | awk '{print $5}' | head -1)
interval = 3
label-connected =  %ifname% %downspeed%  %upspeed%
label-connected-foreground = ${colors.green}
label-disconnected = 睊 disconnected
label-disconnected-foreground = ${colors.red}

[module/clipboard]
type = custom/text
content = 
content-foreground = ${colors.cyan}
click-left = copyq toggle

[module/tray]
type = internal/tray
tray-size = 16
tray-padding = 4

[module/timer-time]
type = custom/script
exec = ~/.config/timer/bin/polybar_timer.sh
interval = 1
click-left = ~/.config/timer/bin/polybar_timer.sh click
format = <label>
label = %output%

[module/timer-break]
type = custom/script
exec = ~/.config/timer/bin/polybar_break.sh
interval = 2
click-left = ~/.config/timer/bin/polybar_break.sh click
format = <label>
label = %output%

[module/timer-done]
type = custom/script
exec = ~/.config/timer/bin/polybar_done.sh
interval = 2
click-left = ~/.config/timer/bin/polybar_done.sh click
format = <label>
label = %output%
